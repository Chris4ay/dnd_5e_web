<!DOCTYPE html>
<html lang="zh-hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5E 不全书</title>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --text: #1C1B1A;
  --text-secondary: #6B6A68;
  --text-tertiary: #9C9B99;
  --border: #E6E4E0;
  --border-light: #EFEDEA;
  --primary: #2563EB;
  --primary-hover: #1D4ED8;
  --primary-light: rgba(37,99,235,0.08);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.08);
  --radius-lg: 16px;
  --radius-md: 10px;
}
body {
  font-family: 'Inter', -apple-system, 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  max-width: 520px;
  width: 90%;
  padding: 48px 0;
  text-align: center;
}
h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
.subtitle { color: var(--text-tertiary); font-size: 14px; margin-bottom: 40px; }
.books { display: flex; flex-direction: column; gap: 16px; }
.book-card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 24px;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  text-decoration: none;
  color: inherit;
  transition: all 200ms cubic-bezier(0.2,0,0,1);
  box-shadow: var(--shadow-sm);
  text-align: left;
}
.book-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.book-icon { font-size: 36px; }
.book-info h3 { font-size: 16px; font-weight: 600; }
.book-info p { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }
.footer { margin-top: 40px; color: var(--text-tertiary); font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>📖 规则书阅览室</h1>
  <p class="subtitle">选择一个规则书开始阅读</p>
  <div class="books">
    <a href="reader.html" class="book-card">
      <div class="book-icon">🐉</div>
      <div class="book-info">
        <h3>5E 不全书</h3>
        <p>D&amp;D 5E 规则书 · 7900+ 条目</p>
      </div>
    </a>

  </div>
  <p class="footer">基于 DND五版不全书</p>
</div>
</body>
</html>
